# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Install system dependencies for Ubuntu
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  # Separate job for Fedora with R-devel and clang
  R-CMD-check-fedora-devel:
    runs-on: ubuntu-latest
    container: fedora:latest
    
    name: Fedora (r-devel, clang)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      CC: clang
      CXX: clang++
      FC: gfortran
      F77: gfortran

    steps:
      - name: Install system dependencies
        run: |
          dnf update -y
          dnf install -y git curl wget which pandoc
          dnf install -y clang gcc-gfortran
          dnf install -y libcurl-devel openssl-devel libxml2-devel
          dnf install -y cairo-devel libX11-devel libXt-devel
          dnf install -y readline-devel zlib-devel bzip2-devel xz-devel
          dnf install -y pcre2-devel texinfo texlive-latex

      - name: Install R-devel from source
        run: |
          cd /tmp
          wget https://cran.r-project.org/src/base-prerelease/R-devel.tar.gz
          tar -xzf R-devel.tar.gz
          cd R-devel
          
          # Configure R to use clang
          cat > config.site << EOF
          CC="clang"
          CXX="clang++"
          FC="gfortran"
          F77="gfortran"
          CFLAGS="-g -O2 -Wall -pedantic -Wextra"
          CXXFLAGS="-g -O2 -Wall -ped
        
